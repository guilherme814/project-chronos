name: Build Project Chronos APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.1-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.1-stable_linux.x86_64

      - name: Show project structure
        run: |
          echo "=== Conteúdo do projeto ==="
          ls -la
          echo "=== Cenas ==="
          ls -la src/scenes/menu/ 2>/dev/null || echo "Pasta não encontrada"
          echo "=== Preset de exportação ==="
          cat export_presets.cfg 2>/dev/null || echo "export_presets.cfg não encontrado"

      - name: Export APK
        run: |
          echo "=== Iniciando exportação ==="
          ./Godot_v4.2.1-stable_linux.x86_64 --headless --export-release "Android" game.apk 2>&1 | tee export.log
          echo "=== Resultado da exportação ==="
          cat export.log
          echo "=== Arquivos criados ==="
          ls -la *.apk 2>/dev/null || echo "NENHUM APK ENCONTRADO"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chronos-android
          path: game.apk
